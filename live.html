<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Adventure Tracker - Live</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            overflow: hidden;
        }
        #map {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
        }

        /* Top bar: sport + live badge */
        #top-bar {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(to bottom, rgba(26,26,46,0.9), transparent);
            z-index: 10; pointer-events: none;
        }
        #sport-label {
            font-size: 16px; font-weight: 600;
            flex-shrink: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 10px;
        }
        #live-badge {
            background: #00ff88; color: #1a1a2e;
            font-size: 11px; font-weight: 700;
            padding: 4px 10px; border-radius: 12px;
            display: flex; align-items: center; gap: 5px;
            flex-shrink: 0;
            white-space: nowrap;
        }
        #live-badge.ended { background: #ff4757; color: #fff; }
        #live-badge.waiting { background: #ffa502; color: #1a1a2e; }
        .pulse-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #1a1a2e;
            animation: pulse 1.5s infinite;
        }
        .pulse-dot.ended { animation: none; background: #fff; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.7); }
        }

        /* Bottom stats panel */
        #stats-panel {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-around;
            padding: 14px 10px 20px;
            background: linear-gradient(to top, rgba(26,26,46,0.95), rgba(26,26,46,0.85), transparent);
            z-index: 10; pointer-events: none;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 22px; font-weight: 700;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 10px; font-weight: 500;
            color: #888; text-transform: uppercase;
            margin-top: 2px;
        }

        /* Last updated */
        #updated-label {
            position: absolute; bottom: 80px; left: 0; right: 0;
            text-align: center; font-size: 10px; color: #666;
            z-index: 10; pointer-events: none;
        }

        /* Loading / error states */
        #overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #1a1a2e; z-index: 100;
            text-align: center; padding: 20px;
        }
        #overlay.hidden { display: none; }
        #overlay h2 { color: #00d4ff; margin-bottom: 10px; font-size: 20px; }
        #overlay p { color: #888; font-size: 14px; line-height: 1.6; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #333;
            border-top-color: #00d4ff; border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Ended banner */
        #ended-banner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26,26,46,0.92);
            border: 1px solid #ff4757;
            border-radius: 16px; padding: 20px 30px;
            text-align: center; z-index: 20;
            display: none;
        }
        #ended-banner h3 { color: #ff4757; font-size: 18px; margin-bottom: 6px; }
        #ended-banner p { color: #888; font-size: 13px; }
    </style>
</head>

        // Detect browser language, fallback to English
        function detectLanguage() {
            const browserLang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
            const lang = browserLang.split("-")[0];
            return STRINGS[lang] ? lang : "en";
        }

        const t = (key) => (STRINGS[lang] && STRINGS[lang][key]) || STRINGS.en[key] || key;

        const app = initializeApp(FIREBASE_CONFIG);
        const db = getDatabase(app);

        let map = null;
        let routeCoords = [];
        let lastLat = null, lastLon = null;

        function formatDistance(meters, sport) {
            if (sport === "swim") return `${Math.round(meters)}m`;
            if (meters >= 1000) return `${(meters / 1000).toFixed(2)} km`;
            return `${Math.round(meters)}m`;
        }

        function computePace(distanceMeters, elapsedStr, sport) {
            const parts = elapsedStr.split(":").map(Number);
            const totalSeconds = parts[0] * 3600 + parts[1] * 60 + parts[2];
            if (totalSeconds <= 0 || distanceMeters <= 0) return "--";

            if (sport === "cycling") {
                const speedKmh = (distanceMeters / 1000) / (totalSeconds / 3600);
                document.getElementById("pace-label").textContent = t("speed");
                return `${speedKmh.toFixed(1)} km/h`;
            }

            let paceBase;
            if (sport === "swim") {
                paceBase = totalSeconds / (distanceMeters / 100);
            } else {
                paceBase = totalSeconds / (distanceMeters / 1000);
            }
            const paceMin = Math.floor(paceBase / 60);
            const paceSec = Math.floor(paceBase % 60);
            document.getElementById("pace-label").textContent = t("pace");
            const unit = sport === "swim" ? "/100m" : "/km";
            return `${paceMin}:${String(paceSec).padStart(2, "0")}${unit}`;
        }

        function initMap(lat, lon, sport) {
            const routeColor = sport === "swim" ? "#e74c3c" : "#00d4ff";

            map = new maplibregl.Map({
                container: "map",
                style: `https://api.maptiler.com/maps/streets-v2/style.json?key=${MAPTILER_KEY}`,
                center: [lon, lat],
                zoom: 16,
                attributionControl: false
            });

            map.addControl(new maplibregl.NavigationControl(), "bottom-right");

            map.on("load", () => {
                map.addSource("route", {
                    type: "geojson",
                    data: { type: "Feature", geometry: { type: "LineString", coordinates: [] } }
                });
                map.addLayer({
                    id: "route-line",
                    type: "line",
                    source: "route",
                    paint: {
                        "line-color": routeColor,
                        "line-width": 4,
                        "line-opacity": 0.85
                    }
                });

                const size = 80;
                const pulsingDot = {
                    width: size, height: size, data: new Uint8Array(size * size * 4),
                    onAdd() { this.canvas = document.createElement("canvas"); this.canvas.width = size; this.canvas.height = size; this.context = this.canvas.getContext("2d"); },
                    render() {
                        const tt = (performance.now() % 1500) / 1500;
                        const ctx = this.context;
                        const r = size / 2;
                        ctx.clearRect(0, 0, size, size);
                        ctx.beginPath();
                        ctx.arc(r, r, r * (0.5 + tt * 0.5), 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(0, 212, 255, ${0.3 * (1 - tt)})`;
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(r, r, 8, 0, Math.PI * 2);
                        ctx.fillStyle = "#00d4ff";
                        ctx.strokeStyle = "#fff";
                        ctx.lineWidth = 2;
                        ctx.fill();
                        ctx.stroke();
                        this.data = ctx.getImageData(0, 0, size, size).data;
                        map.triggerRepaint();
                        return true;
                    }
                };

                map.addImage("pulsing-dot", pulsingDot, { pixelRatio: 2 });
                map.addSource("position", {
                    type: "geojson",
                    data: { type: "Feature", geometry: { type: "Point", coordinates: [lon, lat] } }
                });
                map.addLayer({
                    id: "position-dot",
                    type: "symbol",
                    source: "position",
                    layout: { "icon-image": "pulsing-dot", "icon-allow-overlap": true }
                });
            });
        }

        function updateMap(lat, lon) {
            if (!map) return;

            routeCoords.push([lon, lat]);

            const routeSource = map.getSource("route");
            if (routeSource) {
                routeSource.setData({
                    type: "Feature",
                    geometry: { type: "LineString", coordinates: routeCoords }
                });
            }

            const posSource = map.getSource("position");
            if (posSource) {
                posSource.setData({
                    type: "Feature",
                    geometry: { type: "Point", coordinates: [lon, lat] }
                });
            }

            if (!sessionEnded) {
                map.easeTo({ center: [lon, lat], duration: 500 });
            }
        }

        let updateInterval;
        let lastUpdateTime = null;

        function startUpdatedTimer() {
            if (updateInterval) return;
            updateInterval = setInterval(() => {
                if (!lastUpdateTime) return;
                const seconds = Math.floor((Date.now() - lastUpdateTime) / 1000);
                const label = document.getElementById("updated-label");
                if (seconds < 5) label.textContent = t("updatedNow");
                else if (seconds < 60) label.textContent = t("updatedSec").replace("{0}", seconds);
                else label.textContent = t("updatedMin").replace("{0}", Math.floor(seconds / 60));
            }, 1000);
        }

        // Listen for session data
        let firstLoad = true;
        onValue(sessionRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                overlayText.textContent = t("notFound");
                return;
            }

            const sport = data.sport || "swim";
            const status = data.status || "active";
            const current = data.current;

            // Update sport label
            document.getElementById("sport-label").textContent =
                `${SPORT_EMOJI[sport] || ""} ${t(sport)}`;

            if (status === "ended") {
                sessionEnded = true;
                const badge = document.getElementById("live-badge");
                badge.classList.add("ended");
                badge.querySelector(".pulse-dot").classList.add("ended");
                document.getElementById("badge-text").textContent = t("ended");
                document.getElementById("ended-banner").style.display = "block";
                if (updateInterval) clearInterval(updateInterval);
                document.getElementById("updated-label").textContent = "";
            }

            if (!current) return;

            const lat = current.lat;
            const lon = current.lon;

            if (lat === 0 && lon === 0) {
                if (firstLoad) {
                    overlayText.textContent = t("waitingGps");
                    const badge = document.getElementById("live-badge");
                    badge.classList.add("waiting");
                    document.getElementById("badge-text").textContent = t("waiting");
                }
                return;
            }

            if (!map) {
                overlay.classList.add("hidden");
                initMap(lat, lon, sport);
                startUpdatedTimer();
            }

            if (firstLoad) {
                const badge = document.getElementById("live-badge");
                badge.classList.remove("waiting");
                document.getElementById("badge-text").textContent = status === "ended" ? t("ended") : t("live");
                firstLoad = false;
            }

            if (lat !== lastLat || lon !== lastLon) {
                updateMap(lat, lon);
                lastLat = lat;
                lastLon = lon;
            }

            document.getElementById("stat-distance").textContent = formatDistance(current.distance || 0, sport);
            document.getElementById("stat-elapsed").textContent = current.elapsed || "--:--:--";
            document.getElementById("stat-pace").textContent = computePace(current.distance || 0, current.elapsed || "0:0:0", sport);

            if (current.isPaused && status !== "ended") {
                document.getElementById("badge-text").textContent = t("paused");
                document.getElementById("live-badge").classList.add("waiting");
            } else if (status !== "ended") {
                document.getElementById("badge-text").textContent = t("live");
                document.getElementById("live-badge").classList.remove("waiting");
            }

            lastUpdateTime = current.updatedAt || Date.now();
        }, (error) => {
            overlayText.textContent = t("connectionError");
            console.error("Firebase error:", error);
        });
    </script>
</body>
</html>
